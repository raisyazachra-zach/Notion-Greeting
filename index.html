<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
background:transparent;
}

html, body{
background:transparent !important;
}

body{
padding:0;
min-height:100vh;
}

.widget{
width:100%;
max-width:1400px;
margin:auto;
padding:10px 20px;
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
column-gap:40px;
background:transparent !important;
}

.section{
display:flex;
flex-direction:column;
justify-content:center;
background:transparent;
}

.center{
text-align:center;
}

.right{
text-align:right;
}

.greeting{
font-size:28px;
font-weight:700;
color:#447A5F;
margin-bottom:6px;
background:transparent;
}

.date{
font-size:15px;
color:#9A9A9A;
background:transparent;
}

.clock{
font-size:36px;
font-weight:700;
color:#832D51;
letter-spacing:-1px;
line-height:1;
background:transparent;
}

.quote{
font-size:18px;
font-weight:500;
color:#555;
line-height:1.5;
background:transparent;
}

@media(max-width:850px){

.widget{
grid-template-columns:1fr;
row-gap:18px;
text-align:center;
}

.right{
text-align:center;
}

.clock{
font-size:26px;
}

.greeting{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="widget">

<div class="section">
<div class="greeting" id="greeting"></div>
<div class="date" id="date"></div>
</div>

<div class="section center">
<div class="clock" id="time"></div>
</div>

<div class="section right">
<div class="quote" id="quote"></div>
</div>

</div>

<script>

const now=new Date();
const hour=now.getHours();

let greeting="";

if(hour<12){
greeting="Good Morning";
}
else if(hour<18){
greeting="Good Afternoon";
}
else if(hour<22){
greeting="Good Evening";
}
else{
greeting="Good Night";
}

document.getElementById("greeting").textContent=greeting;

document.getElementById("date").textContent=
now.toLocaleDateString("en-US",{
weekday:"long",
month:"long",
day:"numeric",
year:"numeric"
});


function updateClock(){

const n=new Date();

document.getElementById("time").textContent=
n.toLocaleTimeString("en-GB",{
hour:"2-digit",
minute:"2-digit",
second:"2-digit",
hour12:false
});

}

updateClock();
setInterval(updateClock,1000);


const quotes = [

"You're allowed to bloom at your own pace.",

"The bravest thing you can do is keep dreaming.",

"Some days are for growing quietly.",

"Become the person your younger self needed.",

"The world feels bigger when you're hopeful.",

"You don't have to have everything figured out.",

"Collect memories, not pressure.",

"Nothing beautiful blooms overnight.",

"Keep choosing wonder over fear.",

"Your story is still unfolding.",

"You're becoming someone you'll be proud of.",

"There is magic in ordinary days.",

"One day you'll thank yourself for not giving up.",

"Romanticize the little moments.",

"You are growing even when it feels slow.",

"The future belongs to those who keep creating.",

"Take your time. You'll get there.",

"You're writing a life worth remembering.",

"Keep chasing the version of you you've imagined."

];

document.getElementById("quote").textContent=
"❝ "+quotes[now.getDate()%quotes.length];

</script>

</body>
</html>

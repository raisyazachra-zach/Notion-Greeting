<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<title>Creative Greeting Widget</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:transparent;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:16px;
}

.card{

width:100%;
max-width:360px;

padding:20px;

border-radius:18px;

background:rgba(255,255,255,.78);

backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,.65);

box-shadow:0 8px 24px rgba(0,0,0,.08);

}

.greeting{

font-size:18px;

font-weight:700;

margin-bottom:6px;

transition:.3s;

}

.time{

font-size:32px;

font-weight:700;

color:#2b2b2b;

line-height:1;

margin-bottom:8px;

}

.date{

font-size:12px;

color:#888;

margin-bottom:18px;

}

.quote{

font-size:13px;

line-height:1.6;

color:#444;

}

</style>

</head>

<body>

<div class="card">

<div class="greeting" id="greeting"></div>

<div class="time" id="time"></div>

<div class="date" id="date"></div>

<div class="quote" id="quote"></div>

</div>

<script>

// Greeting

const hour = new Date().getHours();

let greeting = "";

if(hour < 12){

greeting = "🌞 Good Morning";

}

else if(hour < 18){

greeting = "☀️ Good Afternoon";

}

else if(hour < 21){

greeting = "🌆 Good Evening";

}

else{

greeting = "🌙 Good Night";

}

document.getElementById("greeting").textContent = greeting;


// Greeting Color

const greetingEl = document.getElementById("greeting");

if(hour < 12){

greetingEl.style.color="#F4B400";

}

else if(hour < 18){

greetingEl.style.color="#FF8A65";

}

else if(hour < 21){

greetingEl.style.color="#F06292";

}

else{

greetingEl.style.color="#8E7CC3";

}


// Clock

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString("en-US",{

hour:"2-digit",

minute:"2-digit",

second:"2-digit",

hour12:false

});

document.getElementById("time").textContent=time;

}

updateClock();

setInterval(updateClock,1000);


// Date

const options={

weekday:"long",

month:"long",

day:"numeric",

year:"numeric"

};

document.getElementById("date").textContent=

new Date().toLocaleDateString("en-US",options);


// Quotes

const quotes=[

"🌸 Tiny progress is still progress.",

"☕ Nothing's Gonna Hurt You.",

"📖 Read one more page today.",

"🎨 Make something only you can make.",

"🌷 Rest is productive too.",

"💛 Don't rush your own timeline.",

"✨ You don't need permission to begin.",

"🪴 Water yourself before watering others.",

"🌼 Your ideas deserve to exist.",

"🌈 Vienna Is Waiting for You.",

"🎵 Put on your favorite playlist and begin.",

"📚 Learn one new thing today.",

"💌 Your future self will thank you.",

"🍀 Small habits become big changes.",

"👑 Slow Down, You're Doing Fine.",

"🌙 Fake it till you make it.",

"🌳 You're On Your Own, Kid. You Always Have Been.",

"💕 Keep Going With Your Silly Dreams.",

"🧚 Promise To Be Dazzling."

];

const day=new Date().getDate();

document.getElementById("quote").textContent=

quotes[(day-1)%quotes.length];

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:transparent;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:16px;
}

.note{

width:320px;
background:#447A5F;
border-radius:22px;
padding:22px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
position:relative;
transition:.35s;

}

.pin{

position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%);
font-size:24px;

}

h2{

font-size:18px;
margin-bottom:18px;
color:#444;

}

.task{

display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
transition:.3s;

}

.task.done{

opacity:.6;
transform:translateX(5px);

}

.task.done input[type="text"]{

text-decoration:line-through;
color:#999;

}

input[type="checkbox"]{

width:18px;
height:18px;
accent-color:#E58DB4;
cursor:pointer;
transition:.25s;

}

input[type="checkbox"]:checked{

transform:scale(1.25);

}

input[type="text"]{

flex:1;
border:none;
background:transparent;
outline:none;
font-size:14px;
color:#444;

}

input[type="text"]::placeholder{

color:#999;

}

.footer{

margin-top:18px;
font-size:12px;
text-align:center;
color:#888;

}

.sparkle{

position:fixed;
font-size:20px;
pointer-events:none;
animation:sparkle .8s ease forwards;

}

@keyframes sparkle{

0%{
opacity:0;
transform:translateY(10px) scale(.3);
}

40%{
opacity:1;
}

100%{
opacity:0;
transform:translateY(-30px) scale(1.6);
}

}

.note.pop{

animation:pop .35s;

}

@keyframes pop{

0%{
transform:scale(.97);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

</style>

</head>

<body>

<div class="note">

<div class="pin">📌</div>

<h2>Today's Focus</h2>

<div id="tasks"></div>

<div class="footer">
♡ one thing at a time
</div>

</div>

<script>

const container=document.getElementById("tasks");

let saved=JSON.parse(localStorage.getItem("focus"))||[
{text:"Finish report",done:false},
{text:"Read 20 pages",done:false},
{text:"Draw for 30 mins",done:false}
];

function save(){

localStorage.setItem("focus",JSON.stringify(saved));

}

function render(){

container.innerHTML="";

saved.forEach((task,index)=>{

const row=document.createElement("div");
row.className="task";

if(task.done){
row.classList.add("done");
}

const check=document.createElement("input");
check.type="checkbox";
check.checked=task.done;

const text=document.createElement("input");
text.type="text";
text.value=task.text;
text.placeholder="New task...";

text.oninput=()=>{

saved[index].text=text.value;
save();

};

check.onchange=()=>{

saved[index].done=check.checked;

if(check.checked){

row.classList.add("done");

const rect=check.getBoundingClientRect();

const sparkle=document.createElement("div");
sparkle.className="sparkle";
sparkle.textContent="✨";

sparkle.style.left=(rect.left+window.scrollX)+"px";
sparkle.style.top=(rect.top+window.scrollY-5)+"px";

document.body.appendChild(sparkle);

setTimeout(()=>sparkle.remove(),800);

const note=document.querySelector(".note");
note.classList.add("pop");

setTimeout(()=>{
note.classList.remove("pop");
},350);

}else{

row.classList.remove("done");

}

save();

};

row.appendChild(check);
row.appendChild(text);

container.appendChild(row);

});

}

render();

</script>

</body>
</html>
